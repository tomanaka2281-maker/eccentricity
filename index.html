<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- モバイルでの勝手なズームを防ぐ設定を追加 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ツムツム効率管理ツール</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary-color: #4caf50; --accent-color: #ff9800; --bg-color: #f0f2f5; }
        
        /* 全体のはみ出しを防止 */
        * { box-sizing: border-box; }

        body { 
            margin: 0; padding: 0; font-family: "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg-color); color: #333; 
            display: flex; flex-direction: column; height: 100vh; 
            overflow: hidden; /* 全体のスクロールを禁止して内部スクロールに任せる */
            width: 100vw;
        }
        
        @media (min-width: 768px) {
            body { flex-direction: row; }
        }
        
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: white; padding: 30px; border-radius: 20px; text-align: center; color: #333; width: 90%; max-width: 400px; }
        .google-btn { background: #4285f4; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1em; }

        .sidebar { background: #2c3e50; color: white; display: flex; flex-direction: row; flex-shrink: 0; width: 100%; }
        @media (min-width: 768px) {
            .sidebar { width: 200px; flex-direction: column; height: 100vh; }
        }
        
        .user-info { padding: 20px; border-bottom: 1px solid #444; text-align: center; background: #243342; display: none; }
        @media (min-width: 768px) { .user-info { display: block; } }
        .user-info img { width: 50px; border-radius: 50%; border: 2px solid var(--primary-color); margin-bottom: 10px; }
        
        .nav-item { padding: 15px 10px; cursor: pointer; flex: 1; text-align: center; font-weight: bold; font-size: 0.9em; }
        @media (min-width: 768px) { .nav-item { padding: 15px 20px; text-align: left; flex: none; } }
        .nav-item.active { background: var(--primary-color); }

        .main-content { flex: 1; display: flex; overflow: hidden; flex-direction: column; width: 100%; }
        @media (min-width: 1024px) { .main-content { flex-direction: row; } }

        .page { display: none; width: 100%; height: 100%; flex-direction: column; overflow-x: hidden; overflow-y: auto; }
        .page.active { display: flex; }

        .left-panel { flex: 1; padding: 15px; background: white; width: 100%; }
        @media (min-width: 1024px) { .left-panel { padding: 25px; border-right: 2px solid #ddd; } }

        .right-panel { width: 100%; padding: 15px; background: #f8f9fa; gap: 15px; flex-shrink: 0; }
        @media (min-width: 1024px) { .right-panel { width: 380px; padding: 25px; } }

        .card { background: white; padding: 18px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.07); margin-bottom: 15px; width: 100%; }
        
        /* 入力フォームのフォントサイズを16px以上に（iOSの自動ズーム防止） */
        input[type="number"], input[type="text"] { 
            padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; width: 100px; 
        }
        
        .log-container { height: 150px; overflow-y: auto; border: 2px solid #eee; border-radius: 10px; background: #fafafa; padding: 10px; }
        #coinLog { list-style: none; padding: 0; margin: 0; }
        #coinLog li { padding: 8px 0; border-bottom: 1px solid #eee; }

        #display { font-size: 3rem; font-weight: bold; text-align: center; font-family: monospace; }
        #toggleBtn { width: 100%; height: 70px; font-size: 1.5em; font-weight: bold; border-radius: 15px; border: none; cursor: pointer; color: white; }
        
        .calc-btn { width: 100%; background: #ff9800; color: white; border: none; font-size: 1.2em; font-weight: bold; padding: 15px; border-radius: 15px; margin-top: 10px; }
        
        .item-btns { display: flex; gap: 5px; width: 100%; }
        .item-btns button { flex: 1; padding: 10px 5px; border-radius: 8px; border: 1px solid #ddd; background: #f9f9f9; font-weight: bold; font-size: 0.8em; }
        .item-btns button.active { background-color: #ffeb3b !important; border-color: #fbc02d !important; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85em; table-layout: fixed; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <!-- ログイン・コンテンツ部分は前回と同じ（構造のみ最適化） -->
    <div id="loginOverlay">
        <div class="login-card">
            <h2>Tsum Manager Pro</h2>
            <button class="google-btn" onclick="login()">Googleでログイン</button>
        </div>
    </div>

    <div class="sidebar">
        <div id="userInfo" class="user-info"></div>
        <div class="nav-item active" onclick="showPage('calcPage', this)">効率計算</div>
        <div class="nav-item" onclick="showPage('dbPage', this)">ランキング</div>
        <div class="nav-item" style="color:#ff7a7a;" onclick="logout()">ログアウト</div>
    </div>

    <div class="main-content">
        <div id="calcPage" class="page active">
            <div class="left-panel">
                <div class="card" style="border-left: 8px solid #ffeb3b;">
                    <h3 style="margin-top:0; font-size:1em;">素コイン入力</h3>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <input type="number" id="coinInput" onkeydown="handleEnter(event)" placeholder="枚数" inputmode="numeric">
                        <button onclick="saveCoin()" style="flex:1; background:#eee; border:none; border-radius:8px;">記録</button>
                    </div>
                    <div class="item-btns">
                        <button id="btnCoin" class="active" onclick="toggleItem('btnCoin')">+Coin</button>
                        <button id="btn5to4" class="active" onclick="toggleItem('btn5to4')">5→4</button>
                        <button id="btnTime" onclick="toggleItem('btnTime')">+Time</button>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 15px; align-items: center;">
                        <span style="font-weight: bold; font-size: 0.8em;">履歴</span>
                        <button onclick="allClear()" style="color: #999; border: none; background: none; text-decoration: underline; font-size: 0.8em;">全消去</button>
                    </div>
                    <div class="log-container"><ul id="coinLog"></ul></div>
                </div>
                <div class="card" style="border-left: 8px solid #2196f3;">
                    <h3 style="margin-top:0; font-size:1em;">合計時間</h3>
                    <input type="number" id="inputMin" placeholder="分" inputmode="numeric"> 分
                    <input type="number" id="inputSec" placeholder="秒" step="0.1" inputmode="decimal"> 秒
                </div>
            </div>

            <div class="right-panel">
                <div class="card">
                    <div id="display">0.0</div>
                    <button id="toggleBtn" onclick="work()" style="background: #4caf50;">スタート</button>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button onclick="resetTimer()" style="flex: 1; padding: 12px; background: #fff; border: 1px solid #ccc; border-radius: 8px;">リセット</button>
                        <button onclick="addTime()" style="flex: 2; padding: 12px; background: #2196f3; color: white; border-radius: 8px; border:none;">タイム転送</button>
                    </div>
                </div>
                <button class="calc-btn" onclick="calculateFinalEfficiency()">１分効率を計算！</button>
                <div id="result-container" style="margin-top:10px; text-align:center;">
                    <div id="result"></div>
                    <button id="registerBtn" class="calc-btn" style="display:none; background:#2196f3;" onclick="registerTsum()">保存</button>
                </div>
            </div>
        </div>

        <div id="dbPage" class="page">
            <div style="padding: 15px;">
                <div class="card">
                    <h2 style="font-size:1.2em;">マイランキング</h2>
                    <table id="dbTable">
                        <thead><tr><th width="15%">順位</th><th>ツム名</th><th width="25%">効率</th><th width="20%">操作</th></tr></thead>
                        <tbody id="dbBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
    // ※Firebase設定とロジックは前の回答と同じため省略（そのまま流用してください）
    // ... (前回のスクリプト部分をここに貼り付け) ...
    // ただし、モバイル対応のために inputmode="numeric" などを inputタグに追加しています。
</script>
</body>
</html>
