<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ツムツム効率計算機</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5; color: #333;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* --- PC版基本レイアウト --- */
        .left-panel {
            flex: 1; padding: 30px; overflow-y: auto;
            background-color: #ffffff; border-right: 2px solid #ddd;
            display: flex; flex-direction: column;
        }
        .right-panel {
            width: 420px; padding: 30px; background-color: #f8f9fa;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
        }

        /* --- モバイル版レイアウト（画面幅768px以下） --- */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            
            /* パネル全体の順番を定義 */
            .right-panel { width: auto; order: 1; padding: 15px; box-shadow: none; } /* 計測エリアを一番上 */
            .left-panel { order: 2; padding: 15px; border-right: none; border-top: 2px solid #ddd; height: auto; overflow: visible; } /* 記録エリアを二番目 */
            
            /* さらにパネル内の要素の順番を細かく指定 */
            .right-panel { display: flex; flex-direction: column; }
            .stopwatch-card { order: 1; }      /* ストップウォッチ */
            .calc-btn-item { order: 2; }       /* 計算ボタン */
            .result-card-container { order: 3; margin-top: 10px; } /* 結果を一番下 */
        }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.07); margin-bottom: 15px; }

        /* 履歴の独立スクロール窓 */
        .log-container {
            height: 180px; overflow-y: auto; border: 2px solid #eee;
            border-radius: 10px; background: #fafafa; padding: 10px; margin-top: 10px;
        }

        #result-container {
            min-height: 100px; display: flex; align-items: center; justify-content: center;
            background: #fff3e0; border: 3px solid #ff9800; border-radius: 15px; text-align: center;
        }

        #display { font-size: 4em; font-weight: bold; text-align: center; font-family: monospace; color: #444; }
        #toggleBtn {
            width: 100%; height: 100px; font-size: 2.2em; font-weight: bold;
            border-radius: 15px; border: none; cursor: pointer; color: white;
            box-shadow: 0 6px 0 #388e3c; margin-bottom: 10px;
        }

        .input-group { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        input[type="number"] { padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 1.1em; width: 100px; }

        .item-btns button { padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; font-weight: bold; }
        .active { background-color: #ffeb3b !important; border-color: #fbc02d !important; }

        .calc-btn {
            width: 100%; background: #ff9800; color: white; border: none; font-size: 1.5em;
            font-weight: bold; padding: 20px; border-radius: 15px; cursor: pointer; box-shadow: 0 4px 0 #e68900;
        }

        #coinLog { list-style: decimal; padding-left: 25px; margin: 0; }
        #coinLog li { padding: 8px 0; border-bottom: 1px solid #eee; }
        .li-content { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <!-- 記録エリア (PC版では左 / モバイル版では中央) -->
    <div class="left-panel">
        <h1 style="font-size: 1.4em; margin-bottom: 20px;">プレイデータ記録</h1>
        <div class="card" style="border-left: 8px solid #ffeb3b;">
            <h3>コインを入力</h3>
            <div class="input-group">
                <input type="number" id="coinInput" onkeydown="handleEnter(event)" placeholder="枚数"> 枚
                <button onclick="saveCoin()" style="padding: 12px 20px; background: #eee; border-radius: 8px; cursor: pointer; border:1px solid #ccc;">記録(Enter)</button>
            </div>
            <div class="item-btns" style="margin-bottom: 10px;">
                <button id="btnCoin" class="active" onclick="toggleItem('btnCoin')">+Coin</button>
                <button id="btn5to4" class="active" onclick="toggleItem('btn5to4')">5→4</button>
                <button id="btnTime" onclick="toggleItem('btnTime')">+Time</button>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <span style="font-weight: bold; font-size: 0.9em; color: #666;">履歴（下ほど最新）</span>
                <button onclick="allClear()" style="color: #999; border: none; background: none; cursor: pointer; text-decoration: underline; font-size: 0.8em;">全消去</button>
            </div>
            <div class="log-container" id="logContainer">
                <ul id="coinLog"></ul>
            </div>
        </div>
        <div class="card" style="border-left: 8px solid #2196f3;">
            <h3>合計時間の確認</h3>
            <div class="input-group">
                <input type="number" id="inputMin" placeholder="分"> 分
                <input type="number" id="inputSec" placeholder="秒" step="0.1"> 秒
            </div>
        </div>
    </div>

    <!-- 計測・結果エリア (PC版では右 / モバイル版では上・下) -->
    <div class="right-panel">
        <!-- 計測カード -->
        <div class="card stopwatch-card">
            <div id="display">0.0</div>

            <button id="toggleBtn" onclick="work()" style="background: #4caf50;">スタート</button>
            <div style="display: flex; gap: 10px;">
                <button onclick="reset()" style="flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #ccc; background: #fff;">リセット</button>
                <button onclick="add()" style="flex: 2; padding: 15px; background: #2196f3; color: white; border: none; border-radius: 10px; font-weight: bold;">タイムを転送する</button>
            </div>

            <!-- 追加した注意書き -->
            <div style="text-align: center; color: #d32f2f; font-size: 0.8em; font-weight: bold; margin-bottom: 10px;">
                ※他アプリや別サイトを開いている間は<br>
                ストップウォッチは正しく動作しません。
            </div>
        </div>
    
        <!-- 計算ボタン -->
        <div class="calc-btn-item">
            <button class="calc-btn" onclick="calculateFinalEfficiency()">効率検証結果を見る！</button>
        </div>

        <!-- 結果表示 (モバイル時は一番下へ) -->
        <div class="result-card-container">
            <div id="result-container">
                <div id="result" style="font-size: 1.1em; color: #856404; padding: 10px;">ここに結果が表示されます</div>
            </div>
            <div style="margin-top: 10px; background: #eee; padding: 10px; border-radius: 10px; font-size: 0.75em; color: #666;">
                <strong>計算：</strong> [ (枚数 × 1.3) － 代金 ] の合計 ÷ 合計分
            </div>
        </div>
    </div>

<script>
    let totalNetProfit = 0;
    let totalRawCoins = 0; // 素コインの合計
    let recordCount = 0;    // プレイ回数
    let time = 0;
    let timerId = null;

    function toggleItem(btnId) {
        if (document.getElementById('coinLog').children.length > 0) {
            alert("履歴がある間はアイテム設定を変更できません。");
            return;
        }
        document.getElementById(btnId).classList.toggle('active');
    }

    function handleEnter(event) { if (event.key === "Enter") saveCoin(); }

    function saveCoin() {
        const coinInput = document.getElementById('coinInput');
        const c = parseInt(coinInput.value);
        if (c > 0) {
            let itemCost = 0;
            let coinMultiplier = 1.0;
            const hasCoinItem = document.getElementById('btnCoin').classList.contains('active');
            
            if (hasCoinItem) { itemCost += 500; coinMultiplier = 1.3; }
            if (document.getElementById('btn5to4').classList.contains('active')) itemCost += 1800;
            if (document.getElementById('btnTime').classList.contains('active')) itemCost += 1000;

            const netProfit = (c * coinMultiplier) - itemCost;
            
            // データを蓄積
            totalNetProfit += netProfit;
            totalRawCoins += c;
            recordCount += 1;

            const logList = document.getElementById('coinLog');
            const li = document.createElement('li');
            // 削除ボタンに「純利益」と「素コイン」の両方を渡す
            li.innerHTML = `<div class="li-content">
                                <span>${c} 枚${hasCoinItem ? ' <small>(1.3)</small>' : ''}</span>
                                <button onclick="removeLine(this, ${netProfit}, ${c})" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;">×</button>
                            </div>`;
            
            logList.appendChild(li);

            const container = document.getElementById('logContainer');
            container.scrollTop = container.scrollHeight;

            coinInput.value = "";
            coinInput.focus();
        }
    }

    function removeLine(btn, profit, rawCoin) { 
        // 削除された分を各合計から引く
        totalNetProfit -= profit; 
        totalRawCoins -= rawCoin;
        recordCount -= 1;
        btn.closest('li').remove(); 
    }

    function calculateFinalEfficiency() {
        const m = parseFloat(document.getElementById('inputMin').value) || 0;
        const s = parseFloat(document.getElementById('inputSec').value) || 0;
        const totalMinutes = m + (s / 60);

        if (totalMinutes > 0 && recordCount > 0) {
            const finalEff = Math.floor(totalNetProfit / totalMinutes);
            const avgRawCoin = Math.floor(totalRawCoins / recordCount);

            // 結果表示を2段にする
            document.getElementById('result').innerHTML = `
                <div style="margin-bottom: 8px;">
                    <small style="font-size:0.7em; color:#666;">1分あたりの純利益</small><br>
                    <strong style="font-size:1.6em; color:#e65100;">約 ${finalEff} 枚 / 分</strong>
                </div>
                <div style="border-top: 1px dashed #ffb74d; padding-top: 8px;">
                    <small style="font-size:0.7em; color:#666;">1プレイ平均 (素コイン)</small><br>
                    <strong style="font-size:1.3em; color:#5d4037;">${avgRawCoin} 枚</strong>
                </div>
            `;
            
            if (window.innerWidth <= 768) {
                document.getElementById('result-container').scrollIntoView({ behavior: 'smooth' });
            }
        } else { 
            alert("データ（枚数と時間）が足りません！"); 
        }
    }

    function work() {
        const btn = document.getElementById('toggleBtn');
        if (timerId === null) {
            timerId = setInterval(() => { time += 0.1; document.getElementById('display').innerText = time.toFixed(1); }, 100);
            btn.innerText = "ストップ"; btn.style.background = "#f44336";
        } else {
            clearInterval(timerId); timerId = null;
            btn.innerText = "スタート"; btn.style.background = "#4caf50";
        }
    }

    function reset() {
        clearInterval(timerId); timerId = null; time = 0;
        document.getElementById('display').innerText = "0.0";
        document.getElementById('toggleBtn').innerText = "スタート";
        document.getElementById('toggleBtn').style.background = "#4caf50";
    }

    function add() {
        document.getElementById('inputMin').value = Math.floor(time / 60);
        document.getElementById('inputSec').value = (time % 60).toFixed(1);
    }

    function allClear() {
        if (confirm("全消去しますか？")) {
            totalNetProfit = 0;
            totalRawCoins = 0;
            recordCount = 0;
            document.getElementById('coinLog').innerHTML = "";
            document.getElementById('result').innerHTML = "ここに結果が表示されます";
            document.getElementById('inputMin').value = "";
            document.getElementById('inputSec').value = "";
            reset();
        }
    }
</script>
</body>
</html>
